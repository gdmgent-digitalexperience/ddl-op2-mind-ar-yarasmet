<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Opdracht2_Mind AR_YaraSmet</title>
    <script src="https://aframe.io/releases/1.7.1/aframe.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/mind-ar@1.2.5/dist/mindar-image-aframe.prod.js"></script>
</head>
<body>
    
    <a-scene mindar-face embedded color-space="sRGB" renderer="colorManagement: true, physicallyCorrectLights" device-orientation-permission-ui="enabled: false" vr-mode-ui="enabled: false">
    <a-camera active="false" position="0 0 0"></a-camera>
    
    <a-assets>
        <a-asset-item id="zonnebril" src="./assets/pink_round_sunglasses.glb"></a-asset-item>
        <a-asset-item id="masker" src="./assets/robot_01.glb"></a-asset-item>
    </a-assets>

    <a-entity mindar-face-target="ancorIndex; 5">
        <a-gltf-model position="0 0 0" rotation="0 0 0" scale="0 0 0" src="#zonnebril"></a-gltf-model>
    </a-entity>

    <a-entity mindar-face-target="ancorIndex; 5">
        <a-gltf-model position="0 0 0" rotation="0 0 0" scale="0 0 0" src="#masker"></a-gltf-model>
    </a-entity>
    </a-scene>

</body>
</html>
